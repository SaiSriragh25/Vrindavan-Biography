<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
</head>
<body>
    <h2 align="center"><i>REGISTER</i></h2>
    <center>
    <form action="./login.html">
    <p>
        <input
            type="text"
            placeholder="Enter your name"
            name="name" required/>

    </p>
    <p>
        <input type="Email"
        placeholder="Enter your Email"
        name="name" required/>
    </p>

    <p>
        <input type="password" 
        placeholder="Enter your pass word"
        name="Password" required/>
    </p>
    <p>
        <input type="number"
        placeholder="Enter Mobile Number"
        name="phone number" required />
    </p>
    <p>
        <label for="">Date of Birth</label>
        <input type="date" required>
    </p>
    <p>
        <input 
          type="radio"
          id="gmale"
          name="gender"
          value="male" required/>
        <label for="gmale">Male</label>
        <input type="radio" id="gfemale" name="gender" value="female" required/>  
        <label for="gfemale">Female</label>
    </p>
    <p>
        <input type="checkbox" id="10th" value="10th" />
        <label for="10th">10th</label>
        <input type="checkbox" id="inter" value="Inter" />
        <label for="inter">Inter</label>
        <input type="checkbox" id="Btech"value="Btech" /> 
        <label for="Btech">Btech</label>  
    </p>
    <p>
        <input type="file" style="width: 200px;" required>
    </p>
    <p>    <select required>
            <option value="">Select Your City</option>
            <option value="Hyderabad">Hyderabad</option>
            <option value="Karimnagar">Karimnagar</option>
            <option value="Warangal">Warangal</option>
            
          </select>
    </p>    
    
    <p>
        <textarea required placeholder="Enter your address" name="" id=""></textarea>
    </p>
    
    <button>Submit</button>

    </form>
    </center>
</body>
</html>
